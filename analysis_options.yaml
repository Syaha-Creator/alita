analyzer:
  language:
    strict-raw-types: true
  errors:
    # Biarkan ignore untuk deprecated jika perlu, tapi perketat yang lain
    deprecated_member_use: info 
    # Pastikan variabel yang tidak terpakai dianggap peringatan serius
    unused_local_variable: warning
    unused_import: warning
    # freezed + json_serializable menaruh @JsonKey di parameter konstruktor
    invalid_annotation_target: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

include: package:flutter_lints/flutter.yaml

linter:
  rules:
    # --- BEST PRACTICES ---
    avoid_print: true                  # Jangan pakai print di production (pakai debugPrint/Log)
    prefer_const_constructors: true    # Optimasi render (sudah ada)
    prefer_const_literals_to_create_immutables: true
    always_declare_return_types: true  # Biar jelas fungsi return-nya apa (void, Future, dll)
    cancel_subscriptions: true         # Mencegah memory leak pada Stream
    close_sinks: true                  # Mencegah memory leak pada Bloc/Controller
    
    # --- STYLE & CONSISTENCY ---
    prefer_single_quotes: true         # Konsistensi tanda petik satu (lebih bersih)
    sort_child_properties_last: true   # Memudahkan baca widget tree (child selalu paling bawah)
    unawaited_futures: true            # Memastikan Future ditangani dengan 'await' atau diproses
    annotate_overrides: true           # Memberi tahu kalau ini fungsi override dari parent
    avoid_unnecessary_containers: true # Mengurangi widget yang tidak berguna di tree
    
    # --- TYPING SAFETY ---
    always_specify_types: false        # Kadang terlalu berisik, biarkan Dart melakukan inference