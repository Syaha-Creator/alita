name: alitapricelist
description: "Alita Price List"

publish_to: 'none'

version: 1.7.22+50
environment:
  sdk: ^3.6.1

dependencies:
  collection: ^1.19.1
  cross_file: ^0.3.4+2
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  dropdown_search: ^5.0.6
  equatable: ^2.0.7
  file_picker: ^10.3.7
  file_saver: ^0.3.1
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0
  firebase_crashlytics: ^5.0.5
  firebase_analytics: ^12.0.4
  flutter_local_notifications: ^19.3.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  fluttertoast: ^9.0.0
  get_it: ^9.2.0
  go_router: ^17.0.0
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  logger: ^2.5.0
  path_provider: ^2.1.5
  pdf: ^3.11.3
  permission_handler: ^12.0.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  printing: ^5.14.2
  screenshot: ^3.0.0
  share_plus: ^12.0.1
  shared_preferences: ^2.5.2
  timezone: ^0.10.1
  url_launcher: ^6.3.1
  googleapis_auth: ^2.0.0
  image: ^4.1.7
  flutter_dotenv: ^6.0.0
  http: ^1.5.0
  in_app_update: ^4.2.5
  package_info_plus: ^8.1.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  mockito: ^5.4.6
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logo/
    - .env
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
        - asset: assets/fonts/Inter-Italic-VariableFont_opsz,wght.ttf
          style: italic
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700
