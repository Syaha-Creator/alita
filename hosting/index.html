<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alita Pricelist</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 480px; }
    h1 { color: #344767; }
    p { color: #64748B; line-height: 1.5; }
    .store-links { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
    .store-links a { color: #2563eb; text-decoration: none; font-weight: 500; }
    .store-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Alita Pricelist</h1>
  <p id="message">Memeriksa perangkat…</p>
  <div id="storeLinks" class="store-links" style="display: none;">
    <a href="https://play.google.com/store/apps/details?id=com.syahrul.alitapricelist.alitapricelist">Play Store (Android)</a>
    <a href="https://apps.apple.com/us/app/alita-pricelist-v2/id6740308588">App Store (iOS)</a>
  </div>
  <script>
    var PLAY_STORE = 'https://play.google.com/store/apps/details?id=com.syahrul.alitapricelist.alitapricelist';
    var APP_STORE = 'https://apps.apple.com/us/app/alita-pricelist-v2/id6740308588';
    var ua = navigator.userAgent || navigator.vendor || '';
    var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    var isAndroid = /android/i.test(ua);
    if (isIOS && APP_STORE.indexOf('REPLACE') === -1) {
      document.getElementById('message').textContent = 'Mengarahkan ke App Store…';
      window.location.replace(APP_STORE);
    } else if (isAndroid) {
      document.getElementById('message').textContent = 'Mengarahkan ke Play Store…';
      window.location.replace(PLAY_STORE);
    } else {
      document.getElementById('message').innerHTML = 'Link produk akan dibuka di aplikasi. Unduh aplikasi Alita Pricelist untuk melanjutkan.';
      document.getElementById('storeLinks').style.display = 'flex';
    }
  </script>
</body>
</html>
